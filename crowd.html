<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crowd Prediction</title>
    <link rel="stylesheet" href="crowd.css">
</head>
<body>
    <div class="crowd-prediction">
        <h2>Crowd Prediction</h2>
        <div class="crowd-level">
            <div class="crowd-level-bar">
                <div class="crowd-level-indicator" id="crowd-level-indicator"></div>
            </div>
            <p>Crowd Level: <span class="crowd-level-text" id="crowd-level-text"></span></p>
        </div>
        <div class="crowd-info">
            <p>Expected crowd density: <span class="crowd-density" id="crowd-density"></span></p>
            <p>Expected wait time: <span class="wait-time" id="wait-time"></span></p>
        </div>
    </div>

    <script src="crowd.js"></script>
</body>
</html>
