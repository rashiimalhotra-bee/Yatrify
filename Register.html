<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <div class="register-container">
    <div class="animated-bg">
      <div class="quote">
        ᓚ"Start Your Journey<br>where tradition meets adventure"(^◕.◕^)
      </div>
    </div>
    <div class="form-container">
      <h2>Sign Up to Yatrify</h2>
      <div class="social-login">
        <button class="social-btn facebook">Facebook</button>
        <button class="social-btn google">Google</button>
      </div>
      <p>Or sign up with Email</p>
      <form id="signup-form">
        <div class="form-group">
          <input type="text" id="name" name="name" placeholder="Full Name" required>
        </div>
        <div class="form-group">
          <input type="email" id="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="password" name="password" placeholder="Password" required>
        </div>
        <div class="form-group">
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required>
        </div>
        <div class="terms">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">I agree to Terms & Conditions</label>
        </div>
        <button type="submit" class="btn">Create an Account</button>
      </form>                 
    </div>
  </div>
  <script src="register.js"></script>
</body>
</html>
