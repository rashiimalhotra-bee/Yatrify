<!DOCTYPE  html>
<html lang ="en">
<head>
<meta charset ="UTF-8">
<meta name="viewpoint"
content="width=device-width,
initial-scale=1.0">
    <title>Parking Slot Booking</title>
    <link rel="stylesheet" href="parking.css">
</head>
<body>
    <div class="container">
        <h1>Parking Slot Booking</h1>
        <form id="booking-form">
            <label for="city">Select City:</label>
            <select id="city" name="city" required>
                <option value="">Select City</option>
                <option value="Palitana">Palitana</option>
                <option value="Dwarka">Dwarka</option>
                <option value="Somnath">Somnath</option>
                <option value="Ambaji">Ambaji</option>
        

            </select>

            <label for="area">Select Area:</label>
            <select id="area" name="area" required>
                <option value="">Select Area</option>
                <option value="Area 1">Area 1</option>
                <option value="Area 2">Area 2</option>
                <option value="Area 3">Area 3</option>
            </select>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="vehicle-number">Vehicle Number:</label>
            <input type="text" id="vehicle-number" name="vehicle-number" required>

            <div class="parking-slot">
                <h2>Select Parking Slot:</h2>
                <div class="slot-container">
                    <div class="slot">Slot 1</div>
                    <div class="slot">Slot 2</div>
                    <div class="slot">Slot 3</div>
                    <div class="slot">Slot 4</div>
                    <div class="slot">Slot 5</div>
                </div>
            </div>

            <button id="book-btn" type="submit">Book Slot</button>
        </form>
    </div>
    <script src="parking.js"></script>
</body>
</html>
