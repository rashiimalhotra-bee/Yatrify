<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="e-ticketing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>E-ticketing</title>
</head>
<body>
    <div class="top" >
        <div class="heading">
        <h1> Book Your Slots<i class="fa-regular fa-exclamation"></i> </h1>
        </div>
    </div>
    <div class="container">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="gender">Gender:</label>
            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="age">Age:</label>
            <input type="text" id="age" placeholder="Enter your age">
        </div>
        <div class="form-group">
            <label>Booking as:</label>
            <div class="booking-options">
                <button class="visitor-btn">Visitor</button>
                <button class="seller-btn">Seller</button>
            </div>
        </div>
    </div>
    <script src="e-ticketing.js"></script>
</body>
</html>
